<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

#reader{
width:320px;
margin:auto;
}
</style>

</head>

<body>

<h2>Scan Barcode</h2>

<div id="reader"></div>

<script>

const scanner = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

if(!devices.length){
alert("No camera found");
return;
}

const cameraId = devices[0].id;

scanner.start(
cameraId,
{
fps:10,
qrbox:250
},
(decodedText)=>{

window.opener.postMessage(
{ barcode: decodedText },
"*"
);

window.close();

});

});

</script>

</body>
</html>
