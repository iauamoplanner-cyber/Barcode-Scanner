<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h2{
margin-bottom:15px;
font-size:18px;
}

/* scanner container */

#scanner{
width:260px;
max-width:80vw;
position:relative;
border-radius:10px;
overflow:hidden;
}

/* video */

#scanner video{
width:100%;
height:auto;
display:block;
}

/* scan target box */

#targetBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80%;
height:35%;
border:3px solid #00ff66;
border-radius:8px;
pointer-events:none;
}

/* animated scan line */

#scanLine{
position:absolute;
left:10%;
width:80%;
height:3px;
background:#00ff66;
top:50%;
animation:scan 2s infinite;
}

@keyframes scan{

0%{ top:35% }
50%{ top:65% }
100%{ top:35% }

}

@media (max-width:600px){

#scanner{
width:200px;
}

}

</style>

</head>

<body>

<h2>Align Barcode in the Box</h2>

<div id="scanner">

<div id="targetBox"></div>
<div id="scanLine"></div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),

constraints:{
width:{ideal:1280},
height:{ideal:720},
facingMode:"environment"
}

},

locator:{
patchSize:"large",
halfSample:false
},

numOfWorkers:navigator.hardwareConcurrency || 4,

frequency:10,

decoder:{
readers:[
"code_128_reader",
"code_39_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"upc_e_reader"
]
},

locate:true

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});


Quagga.onDetected(function(data){

let code=data.codeResult.code;

document.getElementById("beep").play();

window.opener.postMessage(
{ barcode:code },
"*"
);

Quagga.stop();

setTimeout(()=>{
window.close();
},400);

});

</script>

</body>
</html>
