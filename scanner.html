<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h2{
margin-bottom:15px;
font-size:18px;
}

/* scanner box */

#scanner{
width:260px;
max-width:80vw;
border-radius:10px;
overflow:hidden;
position:relative;
}

/* camera */

#scanner video{
width:100%;
height:auto;
display:block;
}

/* success flash */

#flash{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#00ff55;
opacity:0;
pointer-events:none;
}

.flash{
animation:flash 0.4s;
}

@keyframes flash{
0%{opacity:0}
40%{opacity:0.7}
100%{opacity:0}
}

/* mobile smaller */

@media (max-width:600px){

#scanner{
width:200px;
}

}

</style>

</head>

<body>

<h2>Scanning Barcode...</h2>

<div id="scanner">
<div id="flash"></div>
</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),

constraints:{
width:{ideal:1280},
height:{ideal:720},
facingMode:"environment",

advanced:[
{focusMode:"continuous"},
{exposureMode:"continuous"},
{whiteBalanceMode:"continuous"}
]

}

},

locator:{
patchSize:"large",
halfSample:false
},

numOfWorkers:navigator.hardwareConcurrency || 4,

frequency:10,

decoder:{
readers:[
"code_128_reader",
"code_39_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"upc_e_reader"
]
},

locate:true

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});


/* draw detection box */

Quagga.onProcessed(function(result){

let ctx = Quagga.canvas.ctx.overlay;
let canvas = Quagga.canvas.dom.overlay;

if(result){

if(result.boxes){

ctx.clearRect(0,0,canvas.width,canvas.height);

result.boxes.filter(function(box){
return box !== result.box;
}).forEach(function(box){

Quagga.ImageDebug.drawPath(
box,
{x:0,y:1},
ctx,
{color:"green",lineWidth:2}
);

});

}

if(result.box){

Quagga.ImageDebug.drawPath(
result.box,
{x:0,y:1},
ctx,
{color:"red",lineWidth:3}
);

}

}

});


/* barcode detected */

Quagga.onDetected(function(data){

let code = data.codeResult.code;

/* beep */

document.getElementById("beep").play();

/* flash animation */

let flash = document.getElementById("flash");
flash.classList.add("flash");

setTimeout(()=>{
flash.classList.remove("flash");
},400);

/* send barcode back */

window.opener.postMessage(
{ barcode: code },
"*"
);

/* stop scanner */

Quagga.stop();

/* close scanner */

setTimeout(()=>{
window.close();
},400);

});

</script>

</body>
</html>
