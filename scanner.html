<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h2{
margin-bottom:15px;
font-size:18px;
}

#scanner{
width:260px;
max-width:80vw;
border-radius:10px;
overflow:hidden;
}

video{
width:100%;
border-radius:10px;
}

@media (max-width:600px){
#scanner{
width:200px;
}
}

</style>

</head>

<body>

<h2>Scanning Barcode...</h2>

<div id="scanner">
<video id="video" autoplay></video>
</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()

codeReader.decodeFromConstraints(
{
video:{
facingMode:{ideal:"environment"},
width:{ideal:1280},
height:{ideal:720}
}
},
'video',
(result, err) => {

if(result){

document.getElementById("beep").play()

window.opener.postMessage(
{ barcode: result.text },
"*"
)

codeReader.reset()

setTimeout(()=>{
window.close()
},300)

}

}
)

</script>

</body>
</html>
