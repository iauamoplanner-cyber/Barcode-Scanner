<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

#scanner-container{
position:relative;
width:320px;
margin:auto;
margin-top:20px;
}

#reader{
width:320px;
border-radius:10px;
overflow:hidden;
}

/* red laser scan line */

#scan-line{
position:absolute;
width:100%;
height:3px;
background:red;
top:0;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:0}
50%{top:90%}
100%{top:0}
}

button{
margin-top:15px;
padding:10px 15px;
font-size:16px;
border:none;
border-radius:5px;
background:#28a745;
color:white;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<h2>Scan Barcode</h2>

<div id="scanner-container">

<div id="reader"></div>

<div id="scan-line"></div>

</div>

<br>

<button onclick="switchCamera()">Switch Camera</button>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

let scanner;
let cameras=[];
let currentCamera=0;

scanner=new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices=>{

if(!devices.length){

alert("No camera detected");

return;

}

cameras=devices;

/* choose rear camera if available */

devices.forEach((device,index)=>{

if(device.label.toLowerCase().includes("back") ||
device.label.toLowerCase().includes("rear")){

currentCamera=index;

}

});

startScanner();

});

function startScanner(){

scanner.start(

cameras[currentCamera].id,

{
fps:20,
qrbox:250
},

(decodedText)=>{

/* beep sound */

document.getElementById("beep").play();

/* send barcode back */

window.opener.postMessage(
{ barcode: decodedText },
"*"
);

/* continuous scanning delay */

setTimeout(()=>{},800);

},

(error)=>{}

);

}

/* switch camera */

function switchCamera(){

scanner.stop().then(()=>{

currentCamera++;

if(currentCamera>=cameras.length){

currentCamera=0;

}

startScanner();

});

}

</script>

</body>

</html>
