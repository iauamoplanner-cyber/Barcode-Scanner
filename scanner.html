<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

#scanner{
width:350px;
margin:auto;
margin-top:20px;
}

button{
margin-top:15px;
padding:10px 15px;
font-size:16px;
border:none;
border-radius:5px;
background:#28a745;
color:white;
}

</style>

</head>

<body>

<h2>Scan Barcode</h2>

<div id="scanner"></div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

Quagga.init({

inputStream: {

type : "LiveStream",

target: document.querySelector('#scanner'),

constraints: {
facingMode: "environment"
}

},

decoder: {

readers: [

"code_128_reader",
"code_39_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"upc_e_reader"

]

}

}, function(err){

if(err){

console.log(err);
return;

}

Quagga.start();

});


Quagga.onDetected(function(data){

let code = data.codeResult.code;

/* play beep */

document.getElementById("beep").play();

/* send barcode back */

window.opener.postMessage(
{ barcode: code },
"*"
);

/* stop scanner */

Quagga.stop();

/* close scanner */

setTimeout(()=>{
window.close();
},400);

});

</script>

</body>

</html>
