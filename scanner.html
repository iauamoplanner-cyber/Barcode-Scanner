<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

#scanner-container{
position:relative;
width:320px;
margin:auto;
margin-top:20px;
}

#reader{
width:320px;
border-radius:10px;
overflow:hidden;
}

/* red scan line animation */

#scan-line{
position:absolute;
width:100%;
height:3px;
background:red;
top:0;
animation:scan 2s infinite;
}

@keyframes scan{

0%{top:0}

50%{top:90%}

100%{top:0}

}

</style>

</head>

<body>

<h2>Scan Barcode</h2>

<div id="scanner-container">

<div id="reader"></div>

<div id="scan-line"></div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const scanner = new Html5Qrcode("reader");

/* Start scanner using rear camera on phones */

scanner.start(
{ facingMode: "environment" },
{
fps:15,
qrbox:250,
aspectRatio:1.777
},
(decodedText)=>{

/* play beep sound */

document.getElementById("beep").play();

/* send barcode back to inventory system */

window.opener.postMessage(
{ barcode: decodedText },
"*"
);

/* close scanner window */

setTimeout(()=>{
window.close();
},500);

},
(errorMessage)=>{

/* ignore scan errors */

}

);

</script>

</body>

</html>
