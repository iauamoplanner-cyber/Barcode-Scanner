<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h2{
margin-top:20px;
}

#scanner-container{
position:relative;
width:350px;
margin:auto;
margin-top:20px;
}

#reader{
width:350px;
}

#scan-line{
position:absolute;
width:100%;
height:3px;
background:red;
top:0;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:0}
50%{top:95%}
100%{top:0}
}

</style>

</head>

<body>

<h2>Scan Barcode</h2>

<div id="scanner-container">

<div id="reader"></div>

<div id="scan-line"></div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode: "environment" },
{
fps:20,
qrbox:{ width:300, height:150 }
},
(decodedText)=>{

document.getElementById("beep").play();

/* send barcode back to Apps Script */

window.opener.postMessage(
{ barcode: decodedText },
"*"
);

/* stop camera */

scanner.stop();

/* close scanner window */

setTimeout(()=>{
window.close();
},400);

},
(error)=>{}

);

</script>

</body>
</html>
