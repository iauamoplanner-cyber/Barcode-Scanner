<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h2{
margin-bottom:15px;
font-size:18px;
}

/* Scanner container */

#scanner{
width:260px;
max-width:80vw;
margin:auto;
border-radius:10px;
overflow:hidden;
}

/* Ensure video stays inside */

#scanner video{
width:100%;
height:auto;
display:block;
}

/* Smaller scanner on phones */

@media (max-width:600px){

#scanner{
width:200px;
}

}

</style>

</head>

<body>

<h2>Scanning Barcode...</h2>

<div id="scanner"></div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),

constraints:{
width:640,
height:480,
facingMode:"environment"
}

},

locator:{
patchSize:"large",
halfSample:true
},

numOfWorkers: navigator.hardwareConcurrency || 4,

decoder:{
readers:[
"code_128_reader",
"code_39_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"upc_e_reader"
]
},

locate:true

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});


/* DRAW DETECTION BOX */

Quagga.onProcessed(function(result){

let drawingCtx = Quagga.canvas.ctx.overlay;
let drawingCanvas = Quagga.canvas.dom.overlay;

if(result){

if(result.boxes){

drawingCtx.clearRect(
0,
0,
drawingCanvas.width,
drawingCanvas.height
);

result.boxes.filter(function(box){
return box !== result.box;
}).forEach(function(box){

Quagga.ImageDebug.drawPath(
box,
{ x:0, y:1 },
drawingCtx,
{ color:"green", lineWidth:2 }
);

});

}

if(result.box){

Quagga.ImageDebug.drawPath(
result.box,
{ x:0, y:1 },
drawingCtx,
{ color:"red", lineWidth:3 }
);

}

}

});


/* BARCODE DETECTED */

Quagga.onDetected(function(data){

let code = data.codeResult.code;

document.getElementById("beep").play();

window.opener.postMessage(
{ barcode: code },
"*"
);

Quagga.stop();

setTimeout(()=>{
window.close();
},300);

});

</script>

</body>
</html>
