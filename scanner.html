<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
padding-top:40px;
}

h2{
font-size:18px;
margin-bottom:20px;
}

/* Center container */

#container{
display:flex;
justify-content:center;
}

/* Scanner box */

#scanner{
width:260px;
height:auto;
border:2px solid #2ecc71;
border-radius:10px;
overflow:hidden;
}

/* Keep video inside scanner */

#scanner video{
width:100%;
height:auto;
display:block;
}

</style>

</head>

<body>

<h2>Scanning Barcode...</h2>

<div id="container">
<div id="scanner"></div>
</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),

constraints:{
width:640,
height:480,
facingMode:"environment",
advanced:[
{zoom:2},
{focusMode:"continuous"}
]
}

},

locator:{
patchSize:"medium",
halfSample:false
},

numOfWorkers:navigator.hardwareConcurrency || 4,

frequency:10,

decoder:{
readers:[
"code_128_reader",
"code_39_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"upc_e_reader"
]
},

locate:true

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});


Quagga.onDetected(function(data){

let code=data.codeResult.code;

document.getElementById("beep").play();

window.opener.postMessage(
{ barcode:code },
"*"
);

Quagga.stop();

setTimeout(()=>{
window.close();
},300);

});

</script>

</body>
</html>
