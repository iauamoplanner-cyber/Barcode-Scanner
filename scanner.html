<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

h2{
margin-bottom:15px;
font-size:18px;
}

/* scanner container */

#scanner{
position:relative;
width:260px;
height:200px;
overflow:hidden;
border-radius:10px;
}

/* keep camera inside scanner */

#scanner video,
#scanner canvas{
position:absolute;
top:0;
left:0;
width:100% !important;
height:100% !important;
object-fit:cover;
}

/* smaller on phones */

@media (max-width:600px){

#scanner{
width:200px;
height:150px;
}

}

</style>

</head>

<body>

<h2>Scanning Barcode...</h2>

<div id="scanner"></div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),

constraints:{
width:{ideal:1280},
height:{ideal:720},
facingMode:"environment"
}

},

locator:{
patchSize:"large",
halfSample:false
},

numOfWorkers:navigator.hardwareConcurrency || 4,

frequency:10,

decoder:{
readers:[
"code_128_reader",
"code_39_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"upc_e_reader"
]
},

locate:true

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});


Quagga.onDetected(function(data){

let code = data.codeResult.code;

document.getElementById("beep").play();

window.opener.postMessage(
{ barcode:code },
"*"
);

Quagga.stop();

setTimeout(()=>{
window.close();
},400);

});

</script>

</body>
</html>
