<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/quagga/dist/quagga.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

h2{
margin-bottom:15px;
font-size:18px;
}

/* Scanner container */

#scanner{
width:240px;
height:180px;
position:relative;
overflow:hidden;
border-radius:10px;
border:2px solid #2ecc71;
}

/* Force video to stay inside box */

#scanner video,
#scanner canvas{
position:absolute;
top:0;
left:0;
width:240px !important;
height:180px !important;
object-fit:cover;
}

</style>

</head>

<body>

<h2>Scanning Barcode...</h2>

<div id="scanner"></div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),

constraints:{
width:640,
height:480,
facingMode:"environment",
advanced:[
{zoom:2},
{focusMode:"continuous"}
]
}

},

locator:{
patchSize:"medium",
halfSample:false
},

numOfWorkers:navigator.hardwareConcurrency || 4,

frequency:10,

decoder:{
readers:[
"code_128_reader",
"code_39_reader",
"ean_reader",
"ean_8_reader",
"upc_reader",
"upc_e_reader"
]
},

locate:true

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});


Quagga.onDetected(function(data){

let code=data.codeResult.code;

document.getElementById("beep").play();

window.opener.postMessage(
{ barcode:code },
"*"
);

Quagga.stop();

setTimeout(()=>{
window.close();
},300);

});

</script>

</body>
</html>
